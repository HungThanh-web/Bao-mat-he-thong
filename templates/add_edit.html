<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% if credential %}Sửa{% else %}Thêm{% endif %} mật khẩu</title>
    <link rel="stylesheet" href="/static/style.css" />
    <script src="{{ url_for('static', filename='script.js') }}?v=3" defer></script>
</head>
<body data-authenticated="true" data-lock-seconds="300">
    <main class="container">
        <h1>{% if credential %}Sửa{% else %}Thêm{% endif %} mật khẩu</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <ul class="flash-list">
                {% for category, message in messages %}
                    <li class="flash {{ category }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        {% endwith %}
        <form method="post">
            <label for="service">Tên ứng dụng / Website</label>
            <input id="service" name="service" required value="{{ credential.service if credential else '' }}" />

            <label for="account">Tên đăng nhập</label>
            <input id="account" name="account" required value="{{ credential.account if credential else '' }}" />

            <label for="url">URL website</label>
            <input id="url" name="url" type="url" placeholder="https://example.com" value="{{ credential.url if credential else '' }}" />

            <label for="category">Danh mục</label>
            <input id="category" name="category" list="categorySuggestions" value="{{ credential.category if credential else 'Cá nhân' }}" />
            <datalist id="categorySuggestions">
                <option value="Cá nhân"></option>
                <option value="Công việc"></option>
                <option value="Tài chính"></option>
                <option value="Mạng xã hội"></option>
            </datalist>

            <label for="password">Mật khẩu</label>
            <div class="input-row">
                <input id="password" type="password" name="password" required value="{{ credential.password if credential else '' }}" />
                <button type="button" id="generatePassword" class="button secondary">Tạo</button>
            </div>
            <div class="generator-options">
                <label><span>Dài</span><input id="passwordLength" type="number" min="8" max="64" value="20" /></label>
                <label><input id="useUpper" type="checkbox" checked /> Chữ hoa</label>
                <label><input id="useLower" type="checkbox" checked /> Chữ thường</label>
                <label><input id="useDigits" type="checkbox" checked /> Số</label>
                <label><input id="useSymbols" type="checkbox" checked /> Ký tự đặc biệt</label>
            </div>
            <div class="strength-row">
                <div id="passwordStrength" class="password-strength strength-neutral">Chưa có</div>
                <small id="passwordHint">Độ mạnh cập nhật khi bạn nhập.</small>
            </div>

            <label for="notes">Ghi chú</label>
            <textarea id="notes" name="notes" rows="4">{{ credential.notes if credential else '' }}</textarea>

            <div class="form-actions">
                <button type="submit">Lưu</button>
                <a class="button secondary" href="{{ url_for('routes.dashboard') }}">Hủy</a>
            </div>
        </form>
    </main>
</body>
</html>
