<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký - Mini Password Vault</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="auth-page">
    <main class="container">
        <p class="eyebrow">Tài khoản mới</p>
        <h1>Đăng ký</h1>
        <p>Tạo Master Password mạnh để bảo vệ toàn bộ kho mật khẩu.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <ul class="flash-list">
                {% for category, message in messages %}
                    <li class="flash {{ category }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        {% endwith %}

        <form method="post">
            <label for="username">Tên đăng nhập</label>
            <input id="username" name="username" autocomplete="username" required />

            <label for="password">Master Password</label>
            <input id="password" type="password" name="password" autocomplete="new-password" required />

            <label for="confirm">Xác nhận mật khẩu</label>
            <input id="confirm" type="password" name="confirm" autocomplete="new-password" required />

            <div class="form-actions">
                <button type="submit">Đăng ký</button>
            </div>
        </form>
        <p>Đã có tài khoản? <a href="{{ url_for('routes.login') }}">Đăng nhập</a></p>
    </main>
</body>
</html>
